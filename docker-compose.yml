services:

  mongo:
    image: mongo:7
    container_name: coffee_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: ghcr.io/3rik3lrojo/coffe_review/backend:latest
    container_name: coffee_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongo

volumes:
  mongo_data:
